---
- name: Escuchar webhooks y disparar tasks en SemaphoreUI
  hosts: localhost

  sources:
    - ansible.eda.webhook:
        host: 0.0.0.0
        port: 5000

  rules:
    - name: Disparar Hello Ansible en SemaphoreUI
      condition: event.payload is defined
      action:
        run_playbook:
          name: playbooks/trigger-semaphore-task.yml
          extra_vars:
            event_message: "{{ event.payload.message | default('Webhook recibido') }}"
            event_action: "{{ event.payload.action | default('info') }}"
            event_target: "{{ event.payload.target | default('all') }}"

    - name: Disparar con prioridad critica
      condition: event.payload.priority is defined and event.payload.priority == "critical"
      action:
        run_playbook:
          name: playbooks/trigger-semaphore-task.yml
          extra_vars:
            event_message: "ALERTA CRITICA: {{ event.payload.message | default('') }}"
            event_action: "{{ event.payload.action | default('alert') }}"
            event_target: "{{ event.payload.target | default('all') }}"
